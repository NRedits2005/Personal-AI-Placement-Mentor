version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: placement_prep_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placement_prep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: placement_prep_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: placement_prep_backend
    restart: always
    command: >
      sh -c "python -m backend.services.db_service && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
      - reports_data:/app/reports
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/placement_prep
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis

  frontend:
    build: .
    container_name: placement_prep_frontend
    restart: always
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - BACKEND_API_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  reports_data:
